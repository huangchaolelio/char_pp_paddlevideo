# ============================================================
# configs/datasets/ucf101.yaml
# ------------------------------------------------------------
# UCF101 数据集 (公开, 6.9GB rar). 含 TableTennisShot (id=89) 等 101 类动作.
# 本项目用它做 'PP-TSM 训练评估链路在真公开数据上端到端验证' (US2 架构验收).
# 与乒乓球细分动作识别 (AI Studio #127, 详见 pingpong_public.yaml) 是不同主题.
# 真公开下载源: https://www.crcv.ucf.edu/data/UCF101/
# ============================================================

name: ucf101
split_version: official-split-1   # UCF101 官方提供 split 1/2/3, 我们用 split1

source:
  type: url_list
  insecure: true   # CRCV 服务器 SSL 证书在某些 client 上不可信; 上游 download_videos.sh 也用 --no-check-certificate
  urls:
    - "https://www.crcv.ucf.edu/data/UCF101/UCF101.rar"

split_strategy: official  # public_datasets 优先识别 trainlist01.txt/testlist01.txt
ratios: {train: 0.7, val: 0.15, test: 0.15}  # fallback only
seed: 2026

# 类别表 (从 ucfTrainTestlist/classInd.txt 派生, 0-indexed):
